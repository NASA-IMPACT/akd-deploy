# prod demonstrates both managed-AWS-resource cases:
# - postgres/redis use the RDS/ElastiCache instances provisioned by infra/aws (see
#   infra/aws/environments/prod.tfvars), wired in via ExternalSecret (environments/prod/secrets/)
# - akd-inference is disabled entirely, since this environment already has access to an
#   external GPU Ollama instance (the RFC's "bring your own GPU" case)
akd-storage:
  postgresql:
    enabled: false
    managed:
      enabled: true
      existingSecret: "akd-prod-rds-connection"
  redis:
    enabled: false
    managed:
      enabled: true
      existingSecret: "akd-prod-redis-connection"
  migrations:
    image:
      tag: "v0.1.0"

akd-auth:
  keycloak:
    enabled: true
    ingress:
      hostname: "auth.akd.example.org"

akd-inference:
  enabled: false # this environment already has access to an external GPU Ollama instance

akd-factuality:
  ollama:
    useInCluster: false
    externalBaseUrl: "https://ollama.prod-cluster.example.org"
  autoscaling:
    enabled: true
    minReplicas: 2

akd-api:
  image:
    tag: "v0.1.0"
  replicaCount: 3
  ingress:
    hostname: "api.akd.example.org"
  config:
    AUTH_MODE: "required"
  dependencies:
    redis:
      managed:
        enabled: true
        existingSecret: "akd-prod-redis-connection"
    ollama:
      baseUrl: "https://ollama.prod-cluster.example.org"

features:
  factReasoner:
    enabled: false
