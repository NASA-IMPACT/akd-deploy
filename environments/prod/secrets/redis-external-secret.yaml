# Requires External Secrets Operator. Syncs the ElastiCache connection string from
# infra/aws/elasticache.tf into the Secret that both akd-storage.redis.managed.existingSecret
# and akd-api.dependencies.redis.managed.existingSecret point at.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akd-prod-redis-connection
  namespace: akd-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: akd-prod-redis-connection
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: akd-prod-redis-connection # aws_secretsmanager_secret.redis_connection, from `terraform output redis_connection_secret_arn`
        property: url
