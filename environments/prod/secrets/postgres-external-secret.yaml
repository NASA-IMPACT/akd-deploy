# Requires External Secrets Operator installed on the cluster (cluster prerequisite,
# not managed by this repo). Syncs the RDS-managed password (rotated automatically by
# AWS) and the connection details (host/port/username/database) from
# infra/aws/rds.tf into the single Kubernetes Secret that akd-storage's
# `postgresql.managed.existingSecret` expects (see akd-prod-rds-connection in
# environments/prod/values.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akd-prod-rds-connection
  namespace: akd-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: akd-prod-rds-connection
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: akd-prod-postgres-connection # aws_secretsmanager_secret.postgres_connection, from `terraform output postgres_connection_secret_arn`
        property: host
    - secretKey: port
      remoteRef:
        key: akd-prod-postgres-connection
        property: port
    - secretKey: username
      remoteRef:
        key: akd-prod-postgres-connection
        property: username
    - secretKey: database
      remoteRef:
        key: akd-prod-postgres-connection
        property: database
    - secretKey: password
      remoteRef:
        key: akd-prod-postgres-connection-password # the RDS-managed secret, see `terraform output postgres_managed_secret_arn`
        property: password
