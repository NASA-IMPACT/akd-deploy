apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "akd-inference.fullname" . }}
  labels:
    {{- include "akd-inference.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "akd-inference.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "akd-inference.labels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 11434
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: models
              mountPath: /root/.ollama
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "akd-inference.fullname" . }}-models
      {{- end }}
