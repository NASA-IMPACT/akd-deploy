# akd-factuality values
image:
  repository: "ghcr.io/nasa-impact/factuality-standalone"
  tag: "latest"

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

# Ollama dependency: either point at the in-cluster akd-inference Service, or at an
# externally managed GPU Ollama instance (the "I already have a GPU Ollama" case).
ollama:
  useInCluster: true
  inClusterServiceName: "akd-inference-akd-inference" # <release>-<chart> from the akd-inference install
  inClusterPort: 11434
  externalBaseUrl: "" # used when ollama.useInCluster=false

resources:
  requests:
    cpu: "500m"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

existingSecret: "akd-factuality-config" # any API keys factuality-standalone needs
